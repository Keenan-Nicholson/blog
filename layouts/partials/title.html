{{ if .Params.private }}
    <title>Private Page - {{ site.Title | markdownify }}</title>
{{ else if .IsHome }}
    <title>{{ site.Title | markdownify }}{{ with site.Params.homeTitleSuffix }} - {{ . }}{{ end }}</title>
{{ else }}
    <title>{{ if .Title }}{{ .Title | markdownify }} - {{ end }}{{ site.Title | markdownify }}</title>
{{ end }}
